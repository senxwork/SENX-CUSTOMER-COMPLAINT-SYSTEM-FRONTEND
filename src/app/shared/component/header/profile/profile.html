<div class="user-wrap" (click)="open()" (clickOutside)="clickOutside()">
  <div class="user-img"><img
        *ngIf="!user?.profile_image"
        src="./assets/images/users/1.png"
        id="userDropdown"
        ngbDropdownToggle
        alt=""
      />
      <img
        *ngIf="user?.profile_image"
        [src]="endpointProfileImage + user?.profile_image"
        id="userDropdown"
        ngbDropdownToggle
        alt=""
      />
</div>
  <div class="user-content">
    <h6>{{ user?.first_name_last_name }}</h6>
    <p class="mb-0">ข้อมูล<i class="fa-solid fa-chevron-down"></i></p>
  </div>
</div>
<div class="custom-menu overflow-hidden" [class.show]="profile">
  <ul class="profile-body">
    <li class="d-flex">
      <svg class="svg-color">
        <use href="assets/svg/iconly-sprite.svg#Profile"></use>
      </svg>
      <a class="ms-2" [routerLink]="'/pages/user-profile'">ข้อมูลโปรไฟล์</a>
    </li>
    
    <li class="d-flex">
      <svg class="svg-color">
        <use href="assets/svg/iconly-sprite.svg#Login"></use>
      </svg>
      <a class="ms-2" (click)="logout()">ออกจากระบบ</a>
    </li>
  </ul>
</div>
