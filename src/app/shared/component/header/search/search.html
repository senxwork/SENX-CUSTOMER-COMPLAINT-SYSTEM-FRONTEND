<div class="Typeahead Typeahead--twitterUsers" (clickOutside)="clickOutside()">
  <div class="u-posRelative d-flex align-items-center">
    <input
      class="demo-input py-0 Typeahead-input form-control-plaintext w-100"
      type="text"
      placeholder="Search Admiro .."
      [(ngModel)]="text"
      [ngModelOptions]="{ standalone: true }"
      (keyup)="searchTerm(text)"
      type="text"
      name="q"
      title=""
      autocomplete="off"
    />
    <i class="search-bg iconly-Search icli" (click)="openSearch()"></i>
  </div>
  @if (menuItems.length) {
    <div
      class="Typeahead-menu custom-scrollbar"
      [class.is-open]="searchResult"
      id="search-outer"
      [class.open]="open"
    >
      @for (menuItem of menuItems | slice: 0 : 8; track menuItem) {
        <div class="ProfileCard u-cf">
          <div class="ProfileCard-details">
            <div class="ProfileCard-realName">
              <div class="ProfileCard-avatar">
                <app-svg-icon [icon]="menuItem.icon" />
              </div>
              <a [routerLink]="menuItem.path" class="realname" (click)="removeFix()">{{
                menuItem.title
              }}</a>
            </div>
          </div>
        </div>
      }
    </div>
  }
  <div class="Typeahead-menu" [class.is-open]="searchResultEmpty">
    <div class="tt-dataset tt-dataset-0">
      <div class="EmptyMessage">Opps!! There are no result found.</div>
    </div>
  </div>
</div>
