<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header">
          <h5>แก้ไขข้อมูลเรื่องร้องเรียน</h5>
        </div>
        <div class="card-body">
          @if (loadingData) {
            <div class="text-center py-5">
              <span class="spinner-border text-primary"></span>
              <p class="mt-2 text-muted">กำลังโหลดข้อมูล...</p>
            </div>
          } @else {
            <form [formGroup]="editForm" (ngSubmit)="onSubmit()">
              <div class="row">
                <!-- Department -->
                <div class="col-md-6 mb-3">
                  <label class="form-label">แผนก</label>
                  <select class="form-select" formControlName="job_departments_id"
                          (change)="onDepartmentChange()">
                    <option value="">-- เลือกแผนก --</option>
                    @for (dept of departments; track dept.job_departments_id) {
                      <option [value]="dept.job_departments_id">{{ dept.job_departments_name }}</option>
                    }
                  </select>
                </div>

                <!-- Category -->
                <div class="col-md-6 mb-3">
                  <label class="form-label">ประเภทงาน</label>
                  <select class="form-select" formControlName="job_catagory_id">
                    <option value="">-- เลือกประเภท --</option>
                    @for (cat of categories; track cat.id) {
                      <option [value]="cat.id">{{ cat.catagory_name }}</option>
                    }
                  </select>
                </div>

                <!-- Project -->
                <div class="col-md-6 mb-3">
                  <label class="form-label">โครงการ</label>
                  <select class="form-select" formControlName="project_id">
                    <option value="">-- เลือกโครงการ --</option>
                    @for (project of projects; track project.id) {
                      <option [value]="project.id">{{ project.project_name_th }}</option>
                    }
                  </select>
                </div>

                <!-- Business Unit -->
                <div class="col-md-6 mb-3">
                  <label class="form-label">Business Unit</label>
                  <select class="form-select" formControlName="business_unit_id">
                    <option value="">-- เลือก BU --</option>
                    @for (bu of businessUnits; track bu.id) {
                      <option [value]="bu.id">{{ bu.bu_name }}</option>
                    }
                  </select>
                </div>

                <!-- Contact Channel -->
                <div class="col-md-6 mb-3">
                  <label class="form-label">ช่องทางติดต่อ</label>
                  <select class="form-select" formControlName="contact_channel_id">
                    <option value="">-- เลือกช่องทาง --</option>
                    @for (channel of contactChannels; track channel.id) {
                      <option [value]="channel.id">{{ channel.channel_name }}</option>
                    }
                  </select>
                </div>



                <!-- Customer Name -->
                <div class="col-md-6 mb-3">
                  <label class="form-label">ชื่อลูกค้า</label>
                  <input type="text" class="form-control" formControlName="customer_name"
                         placeholder="ชื่อลูกค้า">
                </div>

                <!-- House Name -->
                <div class="col-md-6 mb-3">
                  <label class="form-label">บ้านเลขที่ / ที่อยู่</label>
                  <input type="text" class="form-control" formControlName="house_name"
                         placeholder="บ้านเลขที่">
                </div>

                <!-- Telephone -->
                <div class="col-md-6 mb-3">
                  <label class="form-label">เบอร์โทรศัพท์</label>
                  <input type="text" class="form-control" formControlName="telephone"
                         placeholder="เบอร์โทรศัพท์">
                </div>

                <!-- Email -->
                <div class="col-md-6 mb-3">
                  <label class="form-label">อีเมล</label>
                  <input type="email" class="form-control" formControlName="email"
                         placeholder="อีเมล">
                </div>

                <!-- Job Detail -->
                <div class="col-12 mb-3">
                  <label class="form-label">รายละเอียด <span class="text-danger">*</span></label>
                  <textarea class="form-control" formControlName="job_detail"
                            rows="5" placeholder="รายละเอียดงาน"></textarea>
                </div>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary" [disabled]="loading">
                  @if (loading) {
                    <span class="spinner-border spinner-border-sm me-2"></span>
                  }
                  บันทึก
                </button>
                <button type="button" class="btn btn-secondary" (click)="cancel()">
                  ยกเลิก
                </button>
              </div>
            </form>
          }
        </div>
      </div>
    </div>
  </div>
</div>
