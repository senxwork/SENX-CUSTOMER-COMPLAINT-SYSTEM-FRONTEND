<div class="modal-header">
  <h5 class="modal-title">มอบหมายหน่วยงาน</h5>
  <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
</div>

<div class="modal-body">
  @if (loadingOm) {
    <div class="text-center py-4">
      <span class="spinner-border text-primary"></span>
      <p class="mt-2 text-muted">กำลังโหลดรายชื่อหน่วยงาน...</p>
    </div>
  } @else {
    <div class="mb-3">
      <label class="form-label">เลือกหน่วยงาน</label>
      <select class="form-select" [(ngModel)]="selectedOmId">
        <option [ngValue]="null">-- ไม่ระบุ --</option>
        @for (om of omPersons; track om.id) {
          <option [ngValue]="om.id">{{ om.om_name }}</option>
        }
      </select>
    </div>
  }
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">ยกเลิก</button>
  <button type="button" class="btn btn-primary" (click)="onSubmit()"
          [disabled]="loading || loadingOm">
    @if (loading) {
      <span class="spinner-border spinner-border-sm me-2"></span>
    }
    บันทึก
  </button>
</div>
