<div class="modal-header">
  <h5 class="modal-title">เปลี่ยนสถานะ</h5>
  <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
</div>

<div class="modal-body">
  <div class="mb-3">
    <label class="form-label">เลือกสถานะใหม่</label>
    <div class="d-flex flex-column gap-2">
      @for (status of statuses; track status.value) {
        <div class="form-check">
          <input class="form-check-input" type="radio"
                 [id]="'status-' + status.value"
                 [value]="status.value"
                 [(ngModel)]="selectedStatus"
                 name="status">
          <label class="form-check-label" [for]="'status-' + status.value">
            <span class="badge" [ngClass]="status.class">{{ status.label }}</span>
          </label>
        </div>
      }
    </div>
  </div>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">ยกเลิก</button>
  <button type="button" class="btn btn-primary" (click)="onSubmit()" [disabled]="loading">
    @if (loading) {
      <span class="spinner-border spinner-border-sm me-2"></span>
    }
    บันทึก
  </button>
</div>
