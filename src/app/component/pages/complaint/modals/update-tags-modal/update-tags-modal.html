<div class="modal-header">
  <h5 class="modal-title">จัดการ Tag</h5>
  <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
</div>
<div class="modal-body py-4">
  <p class="text-muted small mb-3">เลือก Tag สำหรับงานย่อยนี้ (คลิกเพื่อเลือก/ยกเลิก)</p>
  @if (loadingTags) {
    <div class="text-center py-3">
      <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
      <span class="ms-2">กำลังโหลด Tag...</span>
    </div>
  } @else if (tagOptions.length === 0) {
    <div class="text-center text-muted py-3">
      <i class="fa fa-tags fa-2x mb-2 d-block"></i>
      ยังไม่มี Tag ในระบบ
    </div>
  } @else {
    <div class="d-flex flex-wrap gap-2">
      @for (tag of tagOptions; track tag.id) {
        <button type="button"
                class="btn tag-chip"
                [class.tag-selected]="isSelected(tag.id)"
                [class.tag-unselected]="!isSelected(tag.id)"
                (click)="toggleTag(tag.id)">
          @if (isSelected(tag.id)) {
            <i class="fa fa-check-circle me-1"></i>
          } @else {
            <i class="fa fa-circle-o me-1"></i>
          }
          {{ tag.name }}
        </button>
      }
    </div>
  }
</div>
<div class="modal-footer border-top">
  <button type="button" class="btn btn-light" (click)="activeModal.dismiss()">ยกเลิก</button>
  <button type="button" class="btn btn-primary px-4" (click)="save()" [disabled]="loading">
    @if (loading) {
      <span class="spinner-border spinner-border-sm me-1"></span>
    }
    <i class="fa fa-save me-1"></i>บันทึก
  </button>
</div>
