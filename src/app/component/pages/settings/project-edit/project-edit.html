<div class="container-fluid">
  <div class="row">
    <div class="col-md-12">
      <div class="card">
        <div class="card-header">
          <h5 class="card-title mb-0">
            <i class="fas fa-edit me-2"></i>แก้ไขโครงการ
          </h5>
        </div>
        <div class="card-body">
          <!-- Loading State -->
          <div *ngIf="loadingData" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">กำลังโหลด...</span>
            </div>
            <div class="mt-2">กำลังโหลดข้อมูล...</div>
          </div>

          <!-- Form -->
          <form [formGroup]="projectForm" (ngSubmit)="onSubmit()" *ngIf="!loadingData">
            <div class="row">
              <!-- Project ID -->
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="project_id" class="form-label">
                    Project ID
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="project_id"
                    formControlName="project_id"
                    placeholder="เช่น K2K_4, 113SC, CBDF3"
                  />
                </div>
              </div>

              <!-- Project Name -->
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="project_name_th" class="form-label">
                    ชื่อโครงการ <span class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="project_name_th"
                    formControlName="project_name_th"
                    placeholder="ระบุชื่อโครงการ"
                    [class.is-invalid]="submitted && f['project_name_th'].errors"
                  />
                  <div class="invalid-feedback" *ngIf="submitted && f['project_name_th'].errors">
                    <div *ngIf="f['project_name_th'].errors['required']">กรุณาระบุชื่อโครงการ</div>
                    <div *ngIf="f['project_name_th'].errors['minlength']">ชื่อโครงการต้องมีอย่างน้อย 3 ตัวอักษร</div>
                  </div>
                </div>
              </div>

              <!-- Project Email -->
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="project_email" class="form-label">
                    อีเมลโครงการ <span class="text-danger">*</span>
                  </label>
                  <input
                    type="email"
                    class="form-control"
                    id="project_email"
                    formControlName="project_email"
                    placeholder="example@example.com"
                    [class.is-invalid]="submitted && f['project_email'].errors"
                  />
                  <div class="invalid-feedback" *ngIf="submitted && f['project_email'].errors">
                    <div *ngIf="f['project_email'].errors['required']">กรุณาระบุอีเมล</div>
                    <div *ngIf="f['project_email'].errors['email']">รูปแบบอีเมลไม่ถูกต้อง</div>
                  </div>
                </div>
              </div>

              <!-- Project Type -->
              <div class="col-md-3">
                <div class="mb-3">
                  <label for="project_type" class="form-label">
                    ประเภทโครงการ
                  </label>
                  <select
                    class="form-select"
                    id="project_type"
                    formControlName="project_type"
                  >
                    <option value="">-- เลือกประเภท --</option>
                    <option value="แนวราบ">แนวราบ</option>
                    <option value="แนวสูง">แนวสูง</option>
                  </select>
                </div>
              </div>

              <!-- Is Managed -->
              <div class="col-md-3">
                <div class="mb-3">
                  <label class="form-label d-block">
                    เข้าบริหาร
                  </label>
                  <div class="form-check form-switch mt-2">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="is_managed"
                      formControlName="is_managed"
                    />
                    <label class="form-check-label" for="is_managed">
                      {{ projectForm.get('is_managed')?.value ? 'เข้าบริหารแล้ว' : 'ยังไม่เข้าบริหาร' }}
                    </label>
                  </div>
                </div>
              </div>

              <!-- Is SENA -->
              <div class="col-md-3">
                <div class="mb-3">
                  <label class="form-label d-block">
                    เจ้าของโครงการ
                  </label>
                  <div class="form-check form-switch mt-2">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="is_sena"
                      formControlName="is_sena"
                    />
                    <label class="form-check-label" for="is_sena">
                      {{ projectForm.get('is_sena')?.value ? 'บริษัทเสนา' : 'ไม่ใช่บริษัทเสนา' }}
                    </label>
                  </div>
                </div>
              </div>

              <!-- Project Logo -->
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="project_logo" class="form-label">
                    โลโก้โครงการ
                  </label>
                  <input
                    type="file"
                    class="form-control"
                    id="project_logo"
                    accept="image/*"
                    (change)="onFileSelected($event)"
                  />
                  <small class="form-text text-muted">
                    รองรับไฟล์: JPG, PNG, GIF (ขนาดไม่เกิน 5MB)
                  </small>
                </div>

                <!-- Current Image -->
                <div *ngIf="currentImage && !imagePreview" class="mt-3">
                  <label class="form-label d-block">โลโก้ปัจจุบัน:</label>
                  <div class="position-relative d-inline-block">
                    <img
                      [src]="endpointProjectLogo + currentImage"
                      alt="Current Logo"
                      class="img-thumbnail"
                      style="max-width: 200px; max-height: 200px;"
                    >
                    <button
                      type="button"
                      class="btn btn-danger btn-sm position-absolute top-0 end-0"
                      (click)="removeCurrentImage()"
                      style="margin: 5px;"
                    >
                      <i class="fas fa-times"></i>
                    </button>
                  </div>
                </div>

                <!-- New Image Preview -->
                <div *ngIf="imagePreview" class="mt-3">
                  <label class="form-label d-block">ภาพใหม่:</label>
                  <div class="position-relative d-inline-block">
                    <img [src]="imagePreview" alt="Preview" class="img-thumbnail" style="max-width: 200px; max-height: 200px;">
                    <button
                      type="button"
                      class="btn btn-danger btn-sm position-absolute top-0 end-0"
                      (click)="removeImage()"
                      style="margin: 5px;"
                    >
                      <i class="fas fa-times"></i>
                    </button>
                  </div>
                </div>
              </div>

            </div>

            <!-- Action Buttons -->
            <div class="row">
              <div class="col-md-12">
                <div class="d-flex justify-content-end gap-2">
                  <button
                    type="button"
                    class="btn btn-secondary"
                    (click)="cancel()"
                    [disabled]="loading"
                  >
                    <i class="fas fa-times me-1"></i>ยกเลิก
                  </button>
                  <button
                    type="submit"
                    class="btn btn-primary"
                    [disabled]="loading"
                  >
                    <span *ngIf="loading" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    <i *ngIf="!loading" class="fas fa-save me-1"></i>
                    {{ loading ? 'กำลังบันทึก...' : 'บันทึก' }}
                  </button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
