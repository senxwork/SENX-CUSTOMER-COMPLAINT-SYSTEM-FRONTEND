<div class="modal-header">
  <h5 class="modal-title">เปลี่ยนรหัสผ่าน</h5>
  <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="modal-body">
    <div class="mb-3">
      <label class="form-label">รหัสผ่านใหม่ <span class="text-danger">*</span></label>
      <div class="input-group">
        <input [type]="showPassword ? 'text' : 'password'" class="form-control"
               formControlName="password" placeholder="รหัสผ่านใหม่">
        <button class="btn btn-outline-secondary" type="button" (click)="togglePassword()">
          <i [class]="showPassword ? 'fa fa-eye-slash' : 'fa fa-eye'"></i>
        </button>
      </div>
      <small class="text-muted">รหัสผ่านต้องมีอย่างน้อย 4 ตัวอักษร</small>
    </div>

    <div class="mb-3">
      <label class="form-label">ยืนยันรหัสผ่าน <span class="text-danger">*</span></label>
      <div class="input-group">
        <input [type]="showConfirmPassword ? 'text' : 'password'" class="form-control"
               formControlName="password_confirm" placeholder="ยืนยันรหัสผ่าน">
        <button class="btn btn-outline-secondary" type="button" (click)="toggleConfirmPassword()">
          <i [class]="showConfirmPassword ? 'fa fa-eye-slash' : 'fa fa-eye'"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">ยกเลิก</button>
    <button type="submit" class="btn btn-primary" [disabled]="loading || form.invalid">
      @if (loading) {
        <span class="spinner-border spinner-border-sm me-2"></span>
      }
      บันทึก
    </button>
  </div>
</form>
